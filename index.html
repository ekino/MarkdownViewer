<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <style>
    :root {
      --sidebar-width: 260px;
      --outline-width: 220px;
      --bg: #fafafa;
      --sidebar-bg: #f0f0f0;
      --sidebar-hover: #e2e2e2;
      --sidebar-active: #d4d4d4;
      --border: #ddd;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --code-bg: #f4f4f5;
      --table-border: #e5e5e5;
      --table-stripe: #fafafa;
      --search-hit: #fff3a3;
      --search-hit-active: #ffd54a;
    }

    html[data-theme="dark"] {
      --bg: #18181b;
      --sidebar-bg: #1f1f23;
      --sidebar-hover: #2a2a2e;
      --sidebar-active: #333338;
      --border: #333;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --accent: #60a5fa;
      --accent-light: #1e293b;
      --code-bg: #27272a;
      --table-border: #3f3f46;
      --table-stripe: #1f1f23;
      --search-hit: #52462a;
      --search-hit-active: #a37d2a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #main {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* Custom title bar — uses macOS Overlay style so traffic lights stay native */
    #titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 38px;
      padding-left: 80px;
      padding-right: 12px;
      background: var(--sidebar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }

    #titlebar-title {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      font-size: 13px;
      color: var(--text-muted);
      overflow: hidden;
    }

    #titlebar-filename {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }

    #titlebar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* Search box */
    #search-box {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 4px 2px 8px;
      transition: border-color 0.15s;
    }

    #search-box:focus-within {
      border-color: var(--accent);
    }

    #search-box .search-icon {
      width: 12px;
      height: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    #search-input {
      background: none;
      border: none;
      outline: none;
      font-size: 12px;
      color: var(--text);
      width: 180px;
      padding: 4px 0;
      font-family: inherit;
    }

    #search-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #search-input::placeholder {
      color: var(--text-muted);
    }

    #search-counter {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 0;
      white-space: nowrap;
      padding: 0 4px;
    }

    .search-btn {
      background: none;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 2px 4px;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-btn:hover:not(:disabled) {
      background: var(--sidebar-hover);
      color: var(--text);
    }

    .search-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #search-options-menu {
      position: absolute;
      top: 42px;
      right: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 1000;
      min-width: 180px;
    }

    #search-options-menu.visible {
      display: flex;
    }

    .search-option {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      user-select: none;
    }

    .search-option:hover {
      background: var(--sidebar-hover);
    }

    .search-option input {
      cursor: pointer;
    }

    /* Search highlights — CSS Custom Highlight API */
    ::highlight(mdv-search) {
      background-color: var(--search-hit);
    }

    ::highlight(mdv-search-current) {
      background-color: var(--search-hit-active);
    }

    /* Fallback wrapper highlights */
    mark.mdv-search-hit {
      background: var(--search-hit);
      color: inherit;
      padding: 0;
      border-radius: 2px;
    }

    mark.mdv-search-hit--active {
      background: var(--search-hit-active);
    }

    /* Narrow window collapses search to icon-only */
    @media (max-width: 700px) {
      #search-input,
      #search-counter,
      #search-prev,
      #search-next {
        display: none;
      }

      #search-box.expanded #search-input,
      #search-box.expanded #search-counter,
      #search-box.expanded #search-prev,
      #search-box.expanded #search-next {
        display: inline-flex;
      }
    }

    /* Left sidebar — files */
    #sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #sidebar-header h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      flex: 1;
    }

    #sidebar-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #theme-toggle,
    #print-btn,
    #pdf-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-muted);
      transition:
        background 0.15s,
        color 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }

    #print-btn,
    #pdf-btn {
      display: flex;
      align-items: center;
    }

    #theme-toggle:hover,
    #print-btn:hover,
    #pdf-btn:hover {
      background: var(--sidebar-hover);
      color: var(--text);
    }

    #breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    #breadcrumb span {
      cursor: pointer;
      color: var(--accent);
    }
    #breadcrumb span:hover {
      text-decoration: underline;
    }
    #breadcrumb span.current {
      color: var(--text-muted);
      cursor: default;
    }
    #breadcrumb span.current:hover {
      text-decoration: none;
    }

    #file-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.1s;
      user-select: none;
    }

    .file-item:hover {
      background: var(--sidebar-hover);
    }
    .file-item.active {
      background: var(--sidebar-active);
      font-weight: 600;
    }
    .file-item .icon {
      font-size: 15px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .file-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Center — content */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 48px 40px;
    }

    #content.empty {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #empty-state {
      text-align: center;
      color: var(--text-muted);
    }
    #empty-state h2 {
      font-size: 20px;
      margin-bottom: 12px;
      color: var(--text);
    }
    #empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    #empty-state-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      justify-content: center;
    }

    #open-btn,
    #examples-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #open-btn {
      background: var(--accent);
      color: white;
    }

    #examples-btn {
      background: var(--code-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    #open-btn:hover,
    #examples-btn:hover {
      opacity: 0.85;
    }

    /* Right sidebar — outline */
    #outline {
      width: var(--outline-width);
      min-width: var(--outline-width);
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      display: none;
    }

    #outline-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .outline-item {
      display: block;
      padding: 4px 0;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      line-height: 1.4;
      border-left: 2px solid transparent;
      padding-left: 10px;
      margin-left: -1px;
      transition:
        color 0.1s,
        border-color 0.1s;
    }

    .outline-item:hover {
      color: var(--text);
    }
    .outline-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .outline-item.depth-3 {
      padding-left: 22px;
      font-size: 12px;
    }

    /* Markdown rendering */
    #markdown {
      max-width: 820px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 15px;
    }

    #markdown h1 {
      font-size: 2em;
      font-weight: 700;
      margin: 0 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    #markdown h2 {
      font-size: 1.5em;
      font-weight: 600;
      margin: 32px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    #markdown h3 {
      font-size: 1.25em;
      font-weight: 600;
      margin: 24px 0 8px;
    }
    #markdown h4 {
      font-size: 1.1em;
      font-weight: 600;
      margin: 20px 0 8px;
    }

    #markdown p {
      margin: 0 0 16px;
    }
    #markdown ul,
    #markdown ol {
      margin: 0 0 16px;
      padding-left: 24px;
    }
    #markdown li {
      margin: 4px 0;
    }
    #markdown li > ul,
    #markdown li > ol {
      margin: 4px 0 4px;
    }

    #markdown a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    #markdown a:hover {
      text-decoration: underline;
    }
    #markdown a.external-link::after {
      content: "\00a0🌐";
      font-size: 0.75em;
      vertical-align: super;
    }

    #markdown code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    }

    #markdown pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0 0 16px;
      font-size: 13px;
      line-height: 1.5;
    }

    #markdown pre code {
      background: none;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
      color: var(--text);
    }

    /* Highlight.js — light theme */
    .hljs-keyword,
    .hljs-selector-tag,
    .hljs-built_in {
      color: #d73a49;
    }
    .hljs-string,
    .hljs-attr {
      color: #032f62;
    }
    .hljs-comment,
    .hljs-quote {
      color: #6a737d;
      font-style: italic;
    }
    .hljs-function .hljs-title,
    .hljs-title.function_ {
      color: #6f42c1;
    }
    .hljs-number,
    .hljs-literal {
      color: #005cc5;
    }
    .hljs-type,
    .hljs-title.class_ {
      color: #e36209;
    }
    .hljs-variable,
    .hljs-template-variable {
      color: #e36209;
    }
    .hljs-meta {
      color: #005cc5;
    }
    .hljs-tag {
      color: #22863a;
    }
    .hljs-name {
      color: #22863a;
    }
    .hljs-attribute {
      color: #6f42c1;
    }
    .hljs-symbol,
    .hljs-bullet {
      color: #005cc5;
    }
    .hljs-section {
      color: #005cc5;
      font-weight: 700;
    }
    .hljs-addition {
      color: #22863a;
      background: #f0fff4;
    }
    .hljs-deletion {
      color: #b31d28;
      background: #ffeef0;
    }

    /* Highlight.js — dark theme */
    html[data-theme="dark"] .hljs-keyword,
    html[data-theme="dark"] .hljs-selector-tag,
    html[data-theme="dark"] .hljs-built_in {
      color: #ff7b72;
    }
    html[data-theme="dark"] .hljs-string,
    html[data-theme="dark"] .hljs-attr {
      color: #a5d6ff;
    }
    html[data-theme="dark"] .hljs-comment,
    html[data-theme="dark"] .hljs-quote {
      color: #8b949e;
    }
    html[data-theme="dark"] .hljs-function .hljs-title,
    html[data-theme="dark"] .hljs-title.function_ {
      color: #d2a8ff;
    }
    html[data-theme="dark"] .hljs-number,
    html[data-theme="dark"] .hljs-literal {
      color: #79c0ff;
    }
    html[data-theme="dark"] .hljs-type,
    html[data-theme="dark"] .hljs-title.class_ {
      color: #ffa657;
    }
    html[data-theme="dark"] .hljs-variable,
    html[data-theme="dark"] .hljs-template-variable {
      color: #ffa657;
    }
    html[data-theme="dark"] .hljs-meta {
      color: #79c0ff;
    }
    html[data-theme="dark"] .hljs-tag {
      color: #7ee787;
    }
    html[data-theme="dark"] .hljs-name {
      color: #7ee787;
    }
    html[data-theme="dark"] .hljs-attribute {
      color: #d2a8ff;
    }
    html[data-theme="dark"] .hljs-symbol,
    html[data-theme="dark"] .hljs-bullet {
      color: #79c0ff;
    }
    html[data-theme="dark"] .hljs-section {
      color: #79c0ff;
      font-weight: 700;
    }
    html[data-theme="dark"] .hljs-addition {
      color: #aff5b4;
      background: #033a16;
    }
    html[data-theme="dark"] .hljs-deletion {
      color: #ffdcd7;
      background: #67060c;
    }

    #markdown blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 16px;
      margin: 0 0 16px;
      color: var(--text-muted);
      background: var(--accent-light);
      border-radius: 0 6px 6px 0;
    }

    #markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 16px;
      font-size: 14px;
    }
    #markdown th,
    #markdown td {
      border: 1px solid var(--table-border);
      padding: 8px 12px;
      text-align: left;
    }
    #markdown th {
      font-weight: 600;
      background: var(--code-bg);
    }
    #markdown tr:nth-child(even) {
      background: var(--table-stripe);
    }

    #markdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    #markdown img {
      max-width: 100%;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #markdown img:hover {
      opacity: 0.85;
    }

    /* Inline images: paragraphs with multiple images display as a flex row */
    #markdown p:has(img + img) {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }
    #markdown p:has(img + img) img {
      max-width: calc(50% - 4px);
      flex: 1 1 auto;
      object-fit: cover;
    }
    #markdown strong {
      font-weight: 600;
    }
    #markdown del {
      color: var(--text-muted);
    }

    /* GitHub Alerts */
    .markdown-alert {
      padding: 12px 16px;
      margin: 0 0 16px;
      border-left: 4px solid;
      border-radius: 0 6px 6px 0;
    }

    .markdown-alert .markdown-alert-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .markdown-alert > p:last-child {
      margin-bottom: 0;
    }

    .markdown-alert-note {
      border-left-color: #2563eb;
      background: rgba(37, 99, 235, 0.08);
    }
    .markdown-alert-note .markdown-alert-title {
      color: #2563eb;
    }
    html[data-theme="dark"] .markdown-alert-note {
      background: rgba(96, 165, 250, 0.1);
    }
    html[data-theme="dark"] .markdown-alert-note .markdown-alert-title {
      color: #60a5fa;
    }

    .markdown-alert-tip {
      border-left-color: #16a34a;
      background: rgba(22, 163, 74, 0.08);
    }
    .markdown-alert-tip .markdown-alert-title {
      color: #16a34a;
    }
    html[data-theme="dark"] .markdown-alert-tip {
      background: rgba(34, 197, 94, 0.1);
    }
    html[data-theme="dark"] .markdown-alert-tip .markdown-alert-title {
      color: #22c55e;
    }

    .markdown-alert-important {
      border-left-color: #7c3aed;
      background: rgba(124, 58, 237, 0.08);
    }
    .markdown-alert-important .markdown-alert-title {
      color: #7c3aed;
    }
    html[data-theme="dark"] .markdown-alert-important {
      background: rgba(139, 92, 246, 0.1);
    }
    html[data-theme="dark"] .markdown-alert-important .markdown-alert-title {
      color: #8b5cf6;
    }

    .markdown-alert-warning {
      border-left-color: #d97706;
      background: rgba(217, 119, 6, 0.08);
    }
    .markdown-alert-warning .markdown-alert-title {
      color: #d97706;
    }
    html[data-theme="dark"] .markdown-alert-warning {
      background: rgba(245, 158, 11, 0.1);
    }
    html[data-theme="dark"] .markdown-alert-warning .markdown-alert-title {
      color: #f59e0b;
    }

    .markdown-alert-caution {
      border-left-color: #dc2626;
      background: rgba(220, 38, 38, 0.08);
    }
    .markdown-alert-caution .markdown-alert-title {
      color: #dc2626;
    }
    html[data-theme="dark"] .markdown-alert-caution {
      background: rgba(239, 68, 68, 0.1);
    }
    html[data-theme="dark"] .markdown-alert-caution .markdown-alert-title {
      color: #ef4444;
    }

    /* Footnotes */
    #markdown .footnotes {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }

    #markdown .footnotes ol {
      padding-left: 20px;
    }
    #markdown .footnotes li {
      margin: 4px 0;
    }

    #markdown .footnote-ref a,
    #markdown [data-footnote-ref] {
      color: var(--accent);
      font-size: 0.8em;
      text-decoration: none;
      vertical-align: super;
    }

    #markdown .footnote-ref a:hover,
    #markdown [data-footnote-ref]:hover {
      text-decoration: underline;
    }

    #markdown .footnote-backref,
    #markdown [data-footnote-backref] {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85em;
    }

    #markdown .footnote-backref:hover,
    #markdown [data-footnote-backref]:hover {
      text-decoration: underline;
    }

    /* Task list checkboxes */
    #markdown ul:has(> li > input[type="checkbox"]) {
      list-style: none;
      padding-left: 4px;
    }

    #markdown li:has(> input[type="checkbox"]) {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    #markdown input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--text-muted);
      border-radius: 3px;
      flex-shrink: 0;
      position: relative;
      top: 2px;
      cursor: default;
    }

    #markdown input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    #markdown input[type="checkbox"]:checked::after {
      content: "\2713";
      position: absolute;
      top: -1px;
      left: 1px;
      color: white;
      font-size: 12px;
      font-weight: 700;
    }

    /* Copy button on code blocks */
    #markdown pre {
      position: relative;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 10px;
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0;
      transition:
        opacity 0.15s,
        background 0.15s,
        color 0.15s;
      z-index: 1;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    #markdown pre:hover .copy-btn {
      opacity: 1;
    }
    .copy-btn:hover {
      background: var(--sidebar-hover);
      color: var(--text);
    }
    .copy-btn.copied {
      color: #16a34a;
    }
    html[data-theme="dark"] .copy-btn.copied {
      color: #22c55e;
    }

    /* Image lightbox overlay */
    .image-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .image-overlay.visible {
      opacity: 1;
    }

    .image-overlay-img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      cursor: default;
    }

    /* Mermaid diagrams */
    .mermaid-wrapper {
      position: relative;
      margin: 0 0 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }

    .mermaid-wrapper .mermaid-preview {
      padding: 24px 16px;
      overflow-x: auto;
      overflow-y: auto;
      /* max-height set dynamically by JS based on SVG content */
    }

    .mermaid-wrapper .mermaid-preview svg {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
    }

    .mermaid-fullscreen-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 6px 12px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition:
        background 0.15s,
        color 0.15s;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .mermaid-fullscreen-btn:hover {
      background: var(--sidebar-hover);
      color: var(--text);
    }

    .mermaid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .mermaid-overlay.visible {
      opacity: 1;
    }

    .mermaid-overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .mermaid-overlay-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .mermaid-overlay-close {
      padding: 6px 16px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }

    .mermaid-overlay-close:hover {
      background: var(--sidebar-hover);
    }

    .mermaid-overlay-body {
      flex: 1;
      overflow: auto;
      padding: 32px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .mermaid-overlay-body svg {
      max-width: 95vw;
      height: auto;
    }

    /* Print / PDF export */
    @media print {
      body {
        display: block;
        height: auto;
        overflow: visible;
        background: white;
        color: #1a1a1a;
      }

      #sidebar,
      #outline,
      #empty-state,
      .copy-btn,
      .mermaid-fullscreen-btn,
      #print-btn,
      #theme-toggle {
        display: none !important;
      }

      #content {
        overflow: visible;
        padding: 20px 40px;
      }

      #markdown {
        display: block !important;
        max-width: 100%;
        margin: 0;
        font-size: 12pt;
        line-height: 1.6;
        color: #1a1a1a;
      }

      #markdown pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        border: 1px solid #ccc;
        background: #f8f8f8 !important;
      }

      #markdown pre code {
        color: #1a1a1a !important;
      }

      #markdown a {
        color: #1a1a1a;
        text-decoration: underline;
      }

      #markdown img {
        max-width: 100%;
        page-break-inside: avoid;
      }

      #markdown h1,
      #markdown h2,
      #markdown h3,
      #markdown h4 {
        page-break-after: avoid;
      }

      #markdown table,
      #markdown pre,
      #markdown blockquote {
        page-break-inside: avoid;
      }

      .mermaid-wrapper {
        page-break-inside: avoid;
        border-color: #ccc;
      }
    }

    /* PDF export mode — applied via JS before createPDF capture */
    body.print-mode #sidebar,
    body.print-mode #outline,
    body.print-mode #empty-state,
    body.print-mode .copy-btn,
    body.print-mode .mermaid-fullscreen-btn {
      display: none !important;
    }
    body.print-mode {
      display: block;
      height: auto;
      overflow: visible;
    }
    body.print-mode #content {
      overflow: visible;
      padding: 20px 40px;
    }
    body.print-mode #markdown {
      display: block !important;
      max-width: 100%;
      margin: 0;
    }
    </style>
  </head>
  <body>
    <div id="titlebar" data-tauri-drag-region>
      <div id="titlebar-title" data-tauri-drag-region>
        <span id="titlebar-filename" data-tauri-drag-region></span>
      </div>
      <div id="titlebar-actions">
        <button id="pdf-btn" title="Export to PDF">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" />
            <line x1="12" y1="18" x2="12" y2="12" />
            <polyline points="9 15 12 18 15 15" />
          </svg>
        </button>
        <button id="print-btn" title="Print">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M6 9V2h12v7" />
            <path
              d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"
            />
            <rect x="6" y="14" width="12" height="8" />
          </svg>
        </button>
        <button id="theme-toggle" title="Toggle dark mode"></button>
        <div id="search-box">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            id="search-input"
            type="search"
            placeholder="Rechercher…"
            autocomplete="off"
            spellcheck="false"
            disabled
          >
          <span id="search-counter"></span>
          <button
            class="search-btn"
            id="search-prev"
            title="Précédent (Shift+Cmd+G)"
            disabled
          >
            ↑
          </button>
          <button
            class="search-btn"
            id="search-next"
            title="Suivant (Cmd+G)"
            disabled
          >
            ↓
          </button>
          <button
            class="search-btn"
            id="search-options-btn"
            title="Options de recherche"
          >
            ⚙
          </button>
        </div>
        <div id="search-options-menu">
          <label class="search-option">
            <input type="checkbox" id="search-opt-case">
            <span>Sensible à la casse (Aa)</span>
          </label>
          <label class="search-option">
            <input type="checkbox" id="search-opt-diacritics" checked>
            <span>Ignorer les accents</span>
          </label>
          <label class="search-option">
            <input type="checkbox" id="search-opt-wholeword">
            <span>Mot entier</span>
          </label>
        </div>
      </div>
    </div>

    <div id="main">
      <div id="sidebar">
        <div id="sidebar-header">
          <div id="sidebar-top">
            <h2>Markdown Viewer</h2>
          </div>
          <div id="breadcrumb"></div>
        </div>
        <div id="file-list"></div>
      </div>

      <div id="content" class="empty">
        <div id="empty-state">
          <h2>Markdown Viewer</h2>
          <p>Open a folder to browse your documentation.</p>
          <div id="empty-state-buttons">
            <button id="open-btn">Open folder</button>
            <button id="examples-btn">View examples</button>
          </div>
        </div>
        <div id="markdown" style="display:none"></div>
      </div>

      <div id="outline">
        <div id="outline-title">On this page</div>
        <nav id="outline-nav"></nav>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
