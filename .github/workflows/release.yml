name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Sign & Notarize)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - run: npm ci
      - run: npm test
      - run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Re-sign with hardened runtime
        env:
          SIGNING_IDENTITY: "Developer ID Application: NICOLAS PATRICK PRUD'HOMME (44DTA694H9)"
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/Markdown Viewer.app"

          # Re-sign all dylibs and frameworks inside the app
          find "$APP_PATH/Contents" \( -name "*.dylib" -o -name "*.so" \) -type f | while read lib; do
            codesign --force --options runtime --timestamp --sign "$SIGNING_IDENTITY" "$lib"
          done

          # Re-sign the main binary with entitlements
          codesign --force --options runtime --timestamp \
            --entitlements src-tauri/entitlements.plist \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH/Contents/MacOS/mdv"

          # Re-sign the app bundle with entitlements
          codesign --force --options runtime --timestamp \
            --entitlements src-tauri/entitlements.plist \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH"

          # Verify signature
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "Signature verification passed"

          # Recreate DMG with Applications symlink
          rm -f src-tauri/target/release/bundle/dmg/*.dmg
          STAGING_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"
          hdiutil create \
            -volname "Markdown Viewer" \
            -srcfolder "$STAGING_DIR" \
            -ov -format UDZO \
            "src-tauri/target/release/bundle/dmg/Markdown-Viewer.dmg"
          rm -rf "$STAGING_DIR"

      - name: Build & sign updater artifact (macOS)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          TARBALL="$BUNDLE_DIR/Markdown-Viewer.app.tar.gz"

          # Tar the hardened, re-signed .app (relative path so extraction
          # restores "Markdown Viewer.app"). This MUST run after the re-sign
          # step above, otherwise the update would ship a non-hardened app
          # that Gatekeeper rejects.
          rm -f "$BUNDLE_DIR"/*.app.tar.gz "$BUNDLE_DIR"/*.app.tar.gz.sig
          tar -czf "$TARBALL" -C "$BUNDLE_DIR" "Markdown Viewer.app"

          # Sign the tarball with the updater private key → produces .sig
          npx tauri signer sign "$TARBALL"

      - name: Notarize DMG
        continue-on-error: true
        timeout-minutes: 15
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="src-tauri/target/release/bundle/dmg/Markdown-Viewer.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          echo "NOTARIZED=true" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci
      - run: npm test
      - run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # Rename the versioned NSIS installer + its updater signature to stable,
      # space-free names so latest.json can build a predictable download URL.
      - name: Normalize NSIS artifact names
        shell: bash
        run: |
          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          EXE=$(ls "$NSIS_DIR"/*-setup.exe | head -n1)
          cp "$EXE" "$NSIS_DIR/Markdown-Viewer-setup.exe"
          if [ -f "$EXE.sig" ]; then
            cp "$EXE.sig" "$NSIS_DIR/Markdown-Viewer-setup.exe.sig"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/Markdown-Viewer-setup.exe
            src-tauri/target/release/bundle/nsis/Markdown-Viewer-setup.exe.sig

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Build the Tauri updater manifest that the app polls. `endpoints` in
      # tauri.conf.json points at this file under /releases/latest/download/.
      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE="https://github.com/ekino/MarkdownViewer/releases/download/${TAG}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          MAC_SIG_FILE="artifacts/Markdown-Viewer.app.tar.gz.sig"
          WIN_SIG_FILE="artifacts/Markdown-Viewer-setup.exe.sig"

          PLATFORMS='{}'
          # macOS runner is arm64 → darwin-aarch64 only. Intel/universal is a
          # follow-up; Intel clients simply see "no update" (safe).
          if [ -f "$MAC_SIG_FILE" ]; then
            PLATFORMS=$(jq -n \
              --arg sig "$(cat "$MAC_SIG_FILE")" \
              --arg url "${BASE}/Markdown-Viewer.app.tar.gz" \
              --argjson acc "$PLATFORMS" \
              '$acc + {"darwin-aarch64": {signature: $sig, url: $url}}')
          else
            echo "::warning::macOS updater signature missing — skipping darwin platform"
          fi

          if [ -f "$WIN_SIG_FILE" ]; then
            PLATFORMS=$(jq -n \
              --arg sig "$(cat "$WIN_SIG_FILE")" \
              --arg url "${BASE}/Markdown-Viewer-setup.exe" \
              --argjson acc "$PLATFORMS" \
              '$acc + {"windows-x86_64": {signature: $sig, url: $url}}')
          else
            echo "::warning::Windows updater signature missing — skipping windows platform"
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the release notes for ${TAG}." \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.app.tar.gz
            artifacts/**/*.sig
            latest.json
